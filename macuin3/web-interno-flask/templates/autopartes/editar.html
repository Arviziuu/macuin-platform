{% extends "layouts/base.html" %}{% block title %}Editar Autoparte{% endblock %}
{% block content %}
<div class="page-header"><h4>Editar: {{ autoparte.sku }}</h4></div>
<div class="card p-4" style="max-width:800px"><form method="POST">
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">SKU</label><input type="text" class="form-control" value="{{ autoparte.sku }}" disabled></div>
<div class="col-md-8"><label class="form-label small fw-500">Nombre *</label><input type="text" name="nombre" class="form-control" value="{{ autoparte.nombre }}" required></div></div>
<div class="mb-3"><label class="form-label small fw-500">Descripción</label><textarea name="descripcion" class="form-control" rows="2">{{ autoparte.descripcion or '' }}</textarea></div>
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">Marca</label><input type="text" name="marca" class="form-control" value="{{ autoparte.marca or '' }}"></div>
<div class="col-md-4"><label class="form-label small fw-500">Categoría</label><select name="categoria_id" class="form-select"><option value="">--</option>
{% for c in categorias %}<option value="{{ c.id }}" {% if autoparte.categoria_id==c.id %}selected{% endif %}>{{ c.nombre }}</option>{% endfor %}</select></div>
<div class="col-md-4"><label class="form-label small fw-500">Precio *</label><input type="number" name="precio" step="0.01" class="form-control" value="{{ autoparte.precio }}" required></div></div>
<div class="mb-3"><label class="form-label small fw-500">Compatibilidad</label><input type="text" name="compatibilidad_vehicular" class="form-control" value="{{ autoparte.compatibilidad_vehicular or '' }}"></div>
<div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="activo" id="activo" {% if autoparte.activo %}checked{% endif %}><label class="form-check-label" for="activo">Activo</label></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-primary">Actualizar</button><a href="{{ url_for('autopartes.index') }}" class="btn btn-outline-secondary">Cancelar</a></div>
</form></div>{% endblock %}
