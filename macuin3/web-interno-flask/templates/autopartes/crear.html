{% extends "layouts/base.html" %}{% block title %}Nueva Autoparte{% endblock %}
{% block content %}
<div class="page-header"><h4>Nueva Autoparte</h4></div>
<div class="card p-4" style="max-width:800px"><form method="POST">
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">SKU *</label><input type="text" name="sku" class="form-control" required></div>
<div class="col-md-8"><label class="form-label small fw-500">Nombre *</label><input type="text" name="nombre" class="form-control" required></div></div>
<div class="mb-3"><label class="form-label small fw-500">Descripción</label><textarea name="descripcion" class="form-control" rows="2"></textarea></div>
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">Marca</label><input type="text" name="marca" class="form-control"></div>
<div class="col-md-4"><label class="form-label small fw-500">Categoría</label><select name="categoria_id" class="form-select"><option value="">--</option>
{% for c in categorias %}<option value="{{ c.id }}">{{ c.nombre }}</option>{% endfor %}</select></div>
<div class="col-md-4"><label class="form-label small fw-500">Precio *</label><input type="number" name="precio" step="0.01" class="form-control" required></div></div>
<div class="mb-3"><label class="form-label small fw-500">Compatibilidad</label><input type="text" name="compatibilidad_vehicular" class="form-control"></div>
<div class="mb-3"><label class="form-label small fw-500">URL imagen</label><input type="text" name="imagen_url" class="form-control"></div>
<div class="row mb-3"><div class="col-md-6"><label class="form-label small fw-500">Stock inicial</label><input type="number" name="stock_inicial" class="form-control" value="0"></div>
<div class="col-md-6"><label class="form-label small fw-500">Stock mínimo</label><input type="number" name="stock_minimo" class="form-control" value="5"></div></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-primary">Guardar</button><a href="{{ url_for('autopartes.index') }}" class="btn btn-outline-secondary">Cancelar</a></div>
</form></div>{% endblock %}
