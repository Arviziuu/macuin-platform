{% extends "layouts/base.html" %}{% block title %}Editar Empleado{% endblock %}
{% block content %}
<div class="page-header"><h4>Editar: {{ empleado.nombre }} {{ empleado.apellido }}</h4></div>
<div class="card p-4" style="max-width:700px"><form method="POST">
<div class="row mb-3"><div class="col-md-6"><label class="form-label small fw-500">Nombre *</label><input type="text" name="nombre" class="form-control" value="{{ empleado.nombre }}" required></div>
<div class="col-md-6"><label class="form-label small fw-500">Apellido *</label><input type="text" name="apellido" class="form-control" value="{{ empleado.apellido }}" required></div></div>
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">Teléfono</label><input type="text" name="telefono" class="form-control" value="{{ empleado.telefono or '' }}"></div>
<div class="col-md-4"><label class="form-label small fw-500">Departamento</label><input type="text" name="departamento" class="form-control" value="{{ empleado.departamento or '' }}"></div>
<div class="col-md-4"><label class="form-label small fw-500">Puesto</label><input type="text" name="puesto" class="form-control" value="{{ empleado.puesto or '' }}"></div></div>
<div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="activo" id="activo" {% if empleado.activo %}checked{% endif %}><label class="form-check-label" for="activo">Activo</label></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-primary">Actualizar</button><a href="{{ url_for('empleados.index') }}" class="btn btn-outline-secondary">Cancelar</a></div>
</form></div>{% endblock %}
