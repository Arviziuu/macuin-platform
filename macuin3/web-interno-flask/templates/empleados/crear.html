{% extends "layouts/base.html" %}{% block title %}Nuevo Empleado{% endblock %}
{% block content %}
<div class="page-header"><h4>Nuevo Empleado</h4></div>
<div class="card p-4" style="max-width:700px"><form method="POST">
<div class="row mb-3"><div class="col-md-6"><label class="form-label small fw-500">Nombre *</label><input type="text" name="nombre" class="form-control" required></div>
<div class="col-md-6"><label class="form-label small fw-500">Apellido *</label><input type="text" name="apellido" class="form-control" required></div></div>
<div class="row mb-3"><div class="col-md-6"><label class="form-label small fw-500">Email *</label><input type="email" name="email" class="form-control" required></div>
<div class="col-md-6"><label class="form-label small fw-500">Contraseña *</label><input type="password" name="password" class="form-control" required minlength="6"></div></div>
<div class="row mb-3"><div class="col-md-4"><label class="form-label small fw-500">No. Empleado *</label><input type="text" name="numero_empleado" class="form-control" required></div>
<div class="col-md-4"><label class="form-label small fw-500">Departamento</label><input type="text" name="departamento" class="form-control"></div>
<div class="col-md-4"><label class="form-label small fw-500">Puesto</label><input type="text" name="puesto" class="form-control"></div></div>
<div class="mb-3"><label class="form-label small fw-500">Teléfono</label><input type="text" name="telefono" class="form-control"></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-primary">Guardar</button><a href="{{ url_for('empleados.index') }}" class="btn btn-outline-secondary">Cancelar</a></div>
</form></div>{% endblock %}
